name: Release Extension

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: macos-latest
            platform: darwin
            arch: arm64
          - os: windows-latest
            platform: win32
            arch: x64

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci

      - name: Package extension
        run: |
          npx shx rm -rf dist
          npm run package

      - name: Run tests
        run: npm test

      - name: Create archive
        shell: bash
        run: |
          NAME="mermaid-extension"
          EXT="tar.gz"
          if [ "${{ matrix.platform }}" == "win32" ]; then EXT="zip"; fi
          FILENAME="${{ matrix.platform }}.${{ matrix.arch }}.${NAME}.${EXT}"
          
          cd dist
          if [ "${{ matrix.platform }}" == "win32" ]; then
            # Use 7z to create zip from current directory contents
            7z a "../${FILENAME}" .
          else
            tar -czvf "../${FILENAME}" .
          fi
          cd ..
          echo "ASSET_PATH=${FILENAME}" >> $GITHUB_ENV

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET_PATH }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
